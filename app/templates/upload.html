<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - NECTOR</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 60px auto; text-align: center; }
        #msg { margin-top: 16px; color: #c00; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <h1>NECTOR</h1>
    <form id="upload-form" enctype="multipart/form-data">
        <input type="file" name="images" accept="image/*" multiple required>
        <button type="submit">Upload</button>
    </form>
    <div id="msg"></div>

    <script>
    document.getElementById('upload-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        const msg = document.getElementById('msg');
        btn.disabled = true;
        btn.textContent = 'Uploading...';
        msg.textContent = '';

        const formData = new FormData(this);
        fetch('/upload', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'valid_images') {
                    window.location.href = '/status/' + data.project_id;
                } else {
                    msg.textContent = 'Upload failed: need at least 20 valid images (got ' + data.valid_images + '). Please try again.';
                    btn.disabled = false;
                    btn.textContent = 'Upload';
                }
            })
            .catch(err => {
                msg.textContent = 'Error: ' + err.message;
                btn.disabled = false;
                btn.textContent = 'Upload';
            });
    });
    </script>
</body>
</html>
